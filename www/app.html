<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>装修成本分析系统 - 套价工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f5fa;color:#1a2d3d;font-family:'Noto Sans SC',sans-serif;font-size:13px;min-height:100vh;line-height:1.5}
:root{--bg:#f0f5fa;--bg2:#fff;--bg3:#f7fafd;--bg4:#eaf1f8;--border:#c8d8e8;--bdr2:#a0bcce;
  --acc:#1d6fa5;--acc2:#155d8e;--acc-d:rgba(29,111,165,.10);
  --grn:#0b7b50;--grn-d:rgba(11,123,80,.10);--yel:#b07000;--yel-d:rgba(176,112,0,.10);
  --red:#b93232;--red-d:rgba(185,50,50,.10);--tx:#1a2d3d;--tx2:#3a5470;--tx3:#6e8fa8;
  --shadow:0 1px 5px rgba(20,50,80,.10);--mono:'JetBrains Mono',monospace;--sans:'Noto Sans SC',sans-serif}
.hdr{background:var(--bg2);border-bottom:2px solid var(--border);height:52px;padding:0 22px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-title{font-size:15px;font-weight:700;color:var(--tx)}
.hdr-sub{font-size:11px;color:var(--tx3);margin-left:3px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);
  background:var(--bg2);color:var(--tx2);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .12s;white-space:nowrap;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--bdr2);color:var(--tx);background:var(--bg4)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-pri{background:var(--acc);border-color:var(--acc);color:#fff}
.btn-pri:hover{background:var(--acc2);border-color:var(--acc2);color:#fff}
.btn-suc{background:var(--grn-d);border-color:var(--grn);color:var(--grn);font-weight:600}
.btn-del{background:var(--red-d);border-color:var(--red);color:var(--red);padding:3px 8px;font-size:11px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--tx3);box-shadow:none}
.modal-ov{position:fixed;inset:0;background:rgba(20,40,60,.40);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:2px solid var(--border);border-radius:12px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(20,50,80,.15)}
.modal-hdr{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-ttl{font-size:14px;font-weight:700;color:var(--tx)}
.modal-x{background:none;border:none;color:var(--tx3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.modal-x:hover{color:var(--tx)}
.hidden{display:none!important}
.toast{position:fixed;bottom:22px;right:22px;background:#1a2d3d;border-radius:8px;padding:10px 18px;font-size:12px;color:#fff;
  z-index:400;box-shadow:0 4px 20px rgba(20,50,80,.18);animation:tin .2s ease;pointer-events:none}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ═══════ 加载中 ═══════ -->
<div id="loadScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px">
  <div style="font-size:32px">⏳</div>
  <div style="color:#888;font-size:14px">加载中...</div>
</div>

<!-- ═══════ 主应用 ═══════ -->
<div id="appMain" class="hidden"></div>

<input type="file" id="fileIn" accept=".xlsx,.xls" style="display:none">
<input type="file" id="benchFileIn" accept=".xlsx,.xls" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>var APP_VER = 2; // 强制刷新缓存
// ═══════════ SUPABASE CLIENT ═══════════
const SUPABASE_URL = 'https://lnvtykghcpsjpwczbqsm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_VQNxLrsKEZuZDeAGa7xOAg__SUeFH_Q';

const SB = {
  _token: localStorage.getItem('sb-access-token'),
  _headers() {
    const h = {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY};
    if (this._token) h['Authorization'] = 'Bearer ' + this._token;
    return h;
  },
  async get(table, params={}) {
    const q = new URLSearchParams(); q.set('select', params.select || '*');
    if (params.eq) q.set(params.eq.col, 'eq.'+encodeURIComponent(params.eq.val));
    if (params.order) q.set('order', params.order.col+(params.order.asc?'.asc':'.desc'));
    if (params.limit) q.set('limit', ''+params.limit);
    const r = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+q, {headers: this._headers()});
    const d = await r.json(); if (!r.ok) throw new Error(d.message||'查询失败'); return d;
  },
  async post(table, body) {
    const h = this._headers(); h['Prefer'] = 'return=minimal';
    const r = await fetch(SUPABASE_URL+'/rest/v1/'+table, {method:'POST',headers:h,body:JSON.stringify(body)});
    if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.message||'写入失败'); }
  },
  async delete(table, notCol, notVal) {
    const h = this._headers(); h['Prefer'] = 'return=minimal';
    const r = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+notCol+'=neq.'+encodeURIComponent(notVal), {method:'DELETE',headers:h});
    if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.message||'删除失败'); }
  }
};

// ═══════════ BOOT ═══════════
(async function() {
  const token = localStorage.getItem('sb-access-token');
  const user  = JSON.parse(localStorage.getItem('sb-user')||'{}');
  if (!token || !user.id) { window.location.href = 'index.html'; return; }

  // 校验 token 并获取 profile
  let profile, dbData;
  try {
    const list = await SB.get('profiles', {eq:{col:'id',val:user.id}});
    profile = list[0];
    if (!profile || !profile.is_approved) { window.location.href = 'index.html'; return; }
    // 加载基准价数据
    dbData = await SB.get('benchmark_items', {order:{col:'trade_team',asc:true}});
  } catch(e) {
    // token 过期，尝试刷新
    const rt = localStorage.getItem('sb-refresh-token');
    if (rt) {
      const r = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token', {
        method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
        body:JSON.stringify({refresh_token:rt})
      });
      if (r.ok) { const d=await r.json(); SB._token=d.access_token; localStorage.setItem('sb-access-token',d.access_token);
        localStorage.setItem('sb-refresh-token',d.refresh_token); window.location.reload(); return; }
    }
    window.location.href = 'index.html'; return;
  }

  // 加载套价工具
  await loadApp(profile, dbData||[]);
})();

// ═══════════ LOAD PRICING TOOL ═══════════
async function loadApp(profile, dbData) {
  document.getElementById('loadScreen').classList.add('hidden');
  const main = document.getElementById('appMain');
  main.classList.remove('hidden');

  // 构建基准价DB
  const DB = {};
  dbData.forEach(it => {
    if (!DB[it.trade_team]) DB[it.trade_team] = [];
    DB[it.trade_team].push({
      id: it.internal_code, trade: it.work_type||'', name: it.item_name,
      spec: it.spec||'', unit: it.unit, price: parseFloat(it.unit_price), remark: it.remark||''
    });
  });

  // 构建 ALL 数组
  const ALL = [];
  Object.keys(DB).forEach(sh => { (DB[sh]||[]).forEach(it => ALL.push({...it, sheet: sh})); });
  const SHEETS = Object.keys(DB);

  // ── 渲染 Header ──
  main.innerHTML = `
<div class="hdr">
  <div style="display:flex;align-items:center;gap:6px">
    <span style="font-size:18px">🏗️</span>
    <span class="hdr-title">装修成本分析系统</span>
    <span class="hdr-sub">套价工具</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="userBadge" style="font-size:12px;color:var(--tx2);padding:2px 8px;border-radius:4px;border:1px solid var(--border)">${profile.display_name||profile.username}</span>
    <button class="btn btn-sm" onclick="doLogout()" style="color:var(--red);border-color:var(--red)">退出</button>
  </div>
</div>
<div style="padding:40px;text-align:center">
  <div style="font-size:64px;margin-bottom:16px">🏗️</div>
  <h2 style="font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:8px">基准价库已加载</h2>
  <p style="color:#888;margin-bottom:20px">共 ${dbData.length} 条基准价数据，${SHEETS.length} 个班组</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-pri" onclick="alert('套价工具界面将在下一阶段完善')">📋 进入套价工具</button>
    ${profile.is_admin ? `<button class="btn" onclick="openDataManager()" style="color:var(--acc);border-color:var(--acc)">📊 数据管理</button>` : ''}
  </div>
</div>`;

  // ── Admin: 数据管理弹窗 ──
  if (profile.is_admin) {
    const dm = document.createElement('div');
    dm.id = 'dataMod'; dm.className = 'modal-ov hidden';
    dm.innerHTML = `
<div class="modal" style="width:480px">
  <div class="modal-hdr"><span class="modal-ttl">📊 数据管理</span><button class="modal-x" onclick="closeDataManager()">×</button></div>
  <div style="padding:16px 20px">
    <div style="font-weight:600;color:var(--tx);margin-bottom:8px">🔄 更新基准价库</div>
    <p style="font-size:12px;color:var(--tx3);margin-bottom:12px;line-height:1.7">上传新的 Excel 文件将替换全部现有数据，所有用户立即看到最新版。</p>
    <button class="btn btn-pri" onclick="document.getElementById('benchFileIn').click()">📁 选择 Excel 文件上传</button>
    <div id="uploadStatus" style="margin-top:10px;font-size:12px;color:var(--tx3)"></div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      <div style="font-weight:600;color:var(--tx);margin-bottom:6px">当前数据</div>
      <div id="dataStatus" style="font-size:12px;color:var(--tx3)"></div>
    </div>
  </div>
</div>`;
    document.body.appendChild(dm);
    showDataStatus();
  }
}

function openDataManager() { document.getElementById('dataMod').classList.remove('hidden'); }
function closeDataManager() { document.getElementById('dataMod').classList.add('hidden'); }

async function showDataStatus() {
  try {
    const data = await SB.get('benchmark_items', {order:{col:'trade_team',asc:true}});
    const teams = {};
    data.forEach(it => { teams[it.trade_team] = (teams[it.trade_team]||0)+1; });
    document.getElementById('dataStatus').innerHTML = Object.entries(teams)
      .map(([t,c]) => '<div>'+t+': <b>'+c+'</b> 条</div>').join('') + '<div style="margin-top:4px;color:var(--tx)">合计: <b>'+data.length+'</b> 条</div>';
  } catch(e) { document.getElementById('dataStatus').textContent = '加载失败'; }
}

// ── Admin: 上传基准价 → 同步 Supabase ──
document.getElementById('benchFileIn').addEventListener('change', async function(e) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  const status = document.getElementById('uploadStatus');
  status.innerHTML = '⏳ 解析文件中...';

  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      if (!wb.SheetNames.length) { status.innerHTML = '❌ 文件为空'; return; }
      const newDB = {}; let total = 0;

      wb.SheetNames.forEach(sn => {
        const ws = wb[sn]; const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length < 2) return;
        let hdrRow = -1; const cm = {};
        for (let ri=0; ri<Math.min(10,data.length); ri++) {
          const rowStr = data[ri].map(h=>String(h||'')).join('|');
          const hasId = /内部编号/.test(rowStr);
          const hasPrice = /单价/.test(rowStr);
          if (!hasId && !hasPrice) continue;
          hdrRow = ri;
          data[ri].forEach((h,i)=>{
            const s = String(h||'').replace(/[\s　]/g,'');
            if(/内部编号/.test(s)&&cm.id===undefined) cm.id=i;
            if(/工种/.test(s)&&cm.trade===undefined) cm.trade=i;
            if(/项目名称/.test(s)&&cm.name===undefined) cm.name=i;
            if(/项目特征/.test(s)&&cm.spec===undefined) cm.spec=i;
            if(/^单位$/.test(s)&&cm.unit===undefined) cm.unit=i;
            if(/单价/.test(s)&&cm.price===undefined) cm.price=i;
            if(/备注/.test(s)&&cm.remark===undefined) cm.remark=i;
          }); break;
        }
        if (hdrRow<0||cm.id===undefined||cm.price===undefined) {
          status.innerHTML = '❌ 无法识别列名。行0原始数据：' + JSON.stringify(data[0]);
          return;
        }
        const items = [];
        for (let i=hdrRow+1;i<data.length;i++) {
          const row = data[i]; const id = String(row[cm.id]||'').trim(); if (!id) continue;
          const price = parseFloat(row[cm.price]); if (isNaN(price)) continue;
          items.push({
            internal_code: id, trade_team: sn.replace(/^\d+[、]/, ''),
            work_type: cm.trade!==undefined?String(row[cm.trade]||'').trim():'',
            item_name: cm.name!==undefined?String(row[cm.name]||'').replace(/\n/g,' ').trim():'',
            spec: cm.spec!==undefined?String(row[cm.spec]||'').replace(/\n/g,' ').trim():'',
            unit: cm.unit!==undefined?String(row[cm.unit]||'').trim():'',
            unit_price: price, remark: cm.remark!==undefined?String(row[cm.remark]||'').trim():''
          });
        }
        if (items.length) { newDB[sn] = items; total += items.length; }
      });
      if (!total) { status.innerHTML = '❌ 未识别到有效数据（需含"内部编号""单价"列）'; return; }
      status.innerHTML = '⏳ 解析完成('+total+'条)，写入数据库...';

      // 清空旧数据
      await SB.delete('benchmark_items', 'id', 0);

      // 分批写入新数据（每次50条）
      const allRows = []; Object.values(newDB).forEach(rows => allRows.push(...rows));
      for (let i=0; i<allRows.length; i+=50) {
        await SB.post('benchmark_items', allRows.slice(i,i+50));
        status.innerHTML = '⏳ 写入中... '+Math.min(i+50, allRows.length)+'/'+allRows.length;
      }
      status.innerHTML = '✅ 更新完成！共 '+total+' 条数据已同步到云端。';
      document.getElementById('dataMod').classList.add('hidden');
      window.location.reload();
    } catch(err) { status.innerHTML = '❌ 失败：'+err.message; }
  };
  reader.readAsBinaryString(file);
});

// ═══════════ LOGOUT ═══════════
function doLogout() {
  fetch(SUPABASE_URL+'/auth/v1/logout', {method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+(localStorage.getItem('sb-access-token')||'')}}).catch(()=>{});
  localStorage.removeItem('sb-access-token'); localStorage.removeItem('sb-refresh-token'); localStorage.removeItem('sb-user');
  window.location.href = 'index.html';
}
</script>
</body>
</html>
