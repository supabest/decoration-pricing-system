<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装修成本分析系统</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#f0f5fa;--bg2:#ffffff;--bg3:#f7fafd;--bg4:#eaf1f8;
  --border:#c8d8e8;--bdr2:#a0bcce;
  --acc:#1d6fa5;--acc2:#155d8e;--acc-d:rgba(29,111,165,.10);
  --grn:#0b7b50;--grn-d:rgba(11,123,80,.10);
  --yel:#b07000;--yel-d:rgba(176,112,0,.10);
  --red:#b93232;--red-d:rgba(185,50,50,.10);
  --tx:#1a2d3d;--tx2:#3a5470;--tx3:#6e8fa8;
  --shadow:0 1px 5px rgba(20,50,80,.10);
  --sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:var(--sans);font-size:14px;color:var(--tx);padding:20px}
.auth-box{background:#fff;border-radius:16px;padding:40px;width:420px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-box h1{font-size:22px;font-weight:700;color:#1a1a2e;margin:0 0 4px;text-align:center}
.auth-box p{color:#888;margin:0 0 24px;text-align:center;font-size:14px}
.input-wrap{margin-bottom:16px}
.input-wrap label{display:block;margin-bottom:6px;color:#333;font-weight:500;font-size:14px}
.auth-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #d9d9d9;font-size:15px;
  font-family:var(--sans);outline:none;box-sizing:border-box;transition:border-color .2s}
.auth-input:focus{border-color:#0f3460}
.auth-btn{width:100%;padding:12px;border-radius:8px;border:none;background:#0f3460;color:#fff;
  font-size:16px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .15s}
.auth-btn:hover{opacity:.88}.auth-btn:disabled{opacity:.7;cursor:not-allowed}
.auth-link{color:#0f3460;font-size:14px;font-weight:500;text-decoration:none;cursor:pointer}
.auth-link:hover{text-decoration:underline}
.auth-err{background:#fff2f0;border:1px solid #ffccc7;border-radius:8px;padding:10px 16px;
  color:#cf1322;font-size:14px;margin-bottom:16px;display:none}
.auth-ok{background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;padding:10px 16px;
  color:#389e0d;font-size:14px;margin-bottom:16px;display:none}
.auth-tip{background:#f6f8fa;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#666;line-height:1.6}
.logo{text-align:center;font-size:48px;margin-bottom:8px}
.sep{text-align:center;margin-top:16px}
.sep span{color:#888;font-size:14px}
.pending-icon{text-align:center;font-size:48px;margin-bottom:16px}
.pending-title{font-size:22px;font-weight:700;color:#1a1a2e;margin:0 0 8px;text-align:center}
.pending-desc{color:#666;font-size:15px;line-height:1.6;text-align:center;margin-bottom:24px}
.pending-desc strong{color:#1a1a2e}

/* 管理面板 - 独立页面 */
.admin-page{background:var(--bg);min-height:100vh;padding:0;display:block;border-radius:0}
.admin-hdr{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 24px;height:52px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.admin-hdr-title{font-size:15px;font-weight:700;color:var(--tx)}
.admin-content{max-width:800px;margin:0 auto;padding:24px}
.admin-section{margin-bottom:28px}
.admin-section h3{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.admin-section h3 span{font-size:10px;color:var(--tx3);font-weight:400}
.user-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:5px}
.user-card .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.user-card .name{font-weight:600;font-size:13px;color:var(--tx)}
.user-card .email{font-size:12px;color:var(--tx3)}
.user-card .date{font-size:10px;color:var(--tx3);margin-left:auto}
.badge{padding:1px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-admin{background:var(--acc-d);color:var(--acc)}
.badge-approved{background:var(--grn-d);color:var(--grn)}
.badge-pending{background:var(--yel-d);color:var(--yel)}
.btn{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg2);
  color:var(--tx2);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--bdr2);color:var(--tx);background:var(--bg4)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-suc{background:var(--grn-d);border-color:var(--grn);color:var(--grn);font-weight:600}
.btn-suc:hover{background:rgba(11,123,80,.18)}
.empty-state{padding:24px;text-align:center;color:var(--tx3);font-size:13px}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ════════ 登录 / 注册 / 等待审批 ════════ -->
<div id="authBox" class="auth-box">
  <div class="logo">🏗️</div>
  <h1>装修成本分析系统</h1>
  <p id="authSub">登录您的账户</p>

  <div class="auth-err" id="authErr"></div>
  <div class="auth-ok" id="authOk"></div>

  <!-- 登录 -->
  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="input-wrap">
      <label>邮箱地址</label>
      <input class="auth-input" id="loginEmail" type="email" placeholder="请输入邮箱地址" required>
    </div>
    <div class="input-wrap" style="margin-bottom:20px">
      <label>密码</label>
      <input class="auth-input" id="loginPwd" type="password" placeholder="请输入密码" required>
    </div>
    <button class="auth-btn" id="loginBtn" type="submit">登 录</button>
    <div class="sep"><span>还没有账户？</span><a class="auth-link" onclick="showAuth('register')"> 注册新账户</a></div>
  </form>

  <!-- 注册 -->
  <form id="registerForm" style="display:none" onsubmit="doRegister(event)">
    <div class="input-wrap">
      <label>邮箱地址</label>
      <input class="auth-input" id="regEmail" type="email" placeholder="请输入邮箱地址" required>
    </div>
    <div class="input-wrap">
      <label>显示名称</label>
      <input class="auth-input" id="regName" type="text" placeholder="你的姓名（选填）">
    </div>
    <div class="input-wrap">
      <label>密码</label>
      <input class="auth-input" id="regPwd" type="password" placeholder="至少6位" required>
    </div>
    <div class="input-wrap" style="margin-bottom:14px">
      <label>确认密码</label>
      <input class="auth-input" id="regPwd2" type="password" placeholder="再次输入密码" required>
    </div>
    <div class="auth-tip">📋 注册后需要管理员审批通过才能使用系统。</div>
    <button class="auth-btn" id="regBtn" type="submit">注册并提交审批</button>
    <div class="sep"><span>已有账户？</span><a class="auth-link" onclick="showAuth('login')"> 返回登录</a></div>
  </form>

  <!-- 等待审批 -->
  <div id="pendingBox" style="display:none;text-align:center">
    <div class="pending-icon">⏳</div>
    <div class="pending-title">等待审批</div>
    <div class="pending-desc">您的账户已注册，正在等待管理员审批。<br>审批通过后即可使用系统。</div>
    <button class="auth-btn" onclick="checkApproval()">刷新状态</button>
  </div>
</div>

<!-- ════════ 管理面板（登录后显示）════════ -->
<div id="adminPage" class="admin-page hidden">
  <div class="admin-hdr">
    <span class="admin-hdr-title">⚙ 装修成本分析系统 · 管理面板</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="userBadge" style="font-size:13px;color:var(--tx2)"></span>
      <a href="tool.html" class="btn btn-sm" style="color:var(--grn);border-color:var(--grn);text-decoration:none">🚀 套价工具</a>
      <button class="btn btn-sm" onclick="doLogout()" style="color:var(--red);border-color:var(--red)">退出</button>
    </div>
  </div>
  <div class="admin-content">
    <div class="admin-section">
      <h3>👥 待审批用户 <span id="pendingCount"></span></h3>
      <div id="pendingUsers"></div>
    </div>
    <div class="admin-section">
      <h3>👤 全部用户</h3>
      <div id="allUsers"></div>
	    </div>
	    <div class="admin-section">
	      <h3>📊 待补充基准价 <span id="unmatchedCount" style="font-size:10px;color:var(--tx3)"></span></h3>
	      <div style="font-size:11px;color:var(--tx3);margin-bottom:6px;line-height:1.6">统计所有保存方案中未能匹配基准价的清单项目，按出现次数排序。</div>
	      <div id="unmatchedItems" style="font-size:12px;color:var(--tx3)">加载中...</div>
		    </div>
		    <div class="admin-section">
		      <h3>💬 意见反馈 <span id="fbSummaryCount" style="font-size:10px;color:var(--tx3)"></span></h3>
		      <div style="font-size:11px;color:var(--tx3);margin-bottom:6px;line-height:1.6">用户提交的反馈，可据此调整基准价和规则。</div>
		      <div id="fbSummary" style="font-size:12px;color:var(--tx3)">加载中...</div>
		    </div>
	    </div>
    </div>
  </div>
</div>

<script>
// ═══════════ SUPABASE（直接 Fetch API，不依赖JS SDK）═══════════
const SUPABASE_URL = 'https://lnvtykghcpsjpwczbqsm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_VQNxLrsKEZuZDeAGa7xOAg__SUeFH_Q';

// 简单 Supabase 客户端
const SB = {
  _token: null,
  _refreshPromise: null,

  async _refreshSession() {
    const raw = localStorage.getItem('sb-refresh-token');
    if (!raw) return null;
    const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body: JSON.stringify({refresh_token: raw})
    });
    if (!r.ok) { localStorage.removeItem('sb-refresh-token'); return null; }
    const d = await r.json();
    this._token = d.access_token;
    localStorage.setItem('sb-refresh-token', d.refresh_token);
    localStorage.setItem('sb-access-token', d.access_token);
    localStorage.setItem('sb-user', JSON.stringify(d.user));
    return d;
  },

  _headers() {
    const h = {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY};
    const t = this._token || localStorage.getItem('sb-access-token');
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  },

  async authSignIn(email, password) {
    const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST', headers: {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body: JSON.stringify({email,password})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.msg || d.error_description || d.error || '登录失败');
    this._token = d.access_token;
    localStorage.setItem('sb-access-token', d.access_token);
    localStorage.setItem('sb-refresh-token', d.refresh_token);
    localStorage.setItem('sb-user', JSON.stringify(d.user));
    return d;
  },

  async authSignUp(email, password, username, displayName) {
    const r = await fetch(SUPABASE_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body: JSON.stringify({email,password,data:{username,display_name:displayName}})
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error_description || d.msg || '注册失败');
    if (d.msg) return {msg: d.msg};
    return d;
  },

  async authSignOut() {
    await fetch(SUPABASE_URL + '/auth/v1/logout', {
      method: 'POST', headers: this._headers()
    }).catch(()=>{});
    this._token = null;
    localStorage.removeItem('sb-access-token');
    localStorage.removeItem('sb-refresh-token');
    localStorage.removeItem('sb-user');
  },

  // 便捷 REST 查询
  async get(table, params) {
    const q = new URLSearchParams();
    q.set('select', params.select || '*');
    if (params.eq) q.set(params.eq.col, 'eq.' + encodeURIComponent(params.eq.val));
    if (params.order) q.set('order', params.order.col + (params.order.asc ? '.asc' : '.desc'));
    if (params.limit) q.set('limit', '' + params.limit);
    const url = '/rest/v1/' + table + '?' + q.toString();
    const r = await fetch(SUPABASE_URL + url, {headers: this._headers()});
    const d = await r.json();
    if (!r.ok) throw new Error(d.message || '查询失败');
    return d;
  },

  async patch(table, eqCol, eqVal, body) {
    const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + eqCol + '=eq.' + encodeURIComponent(eqVal), {
      method: 'PATCH', headers: this._headers(), body: JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || '更新失败'); }
  }
};

let CURRENT_USER = null;

function showAuthError(msg) {
  document.getElementById('authErr').textContent = msg;
  document.getElementById('authErr').style.display = 'block';
}
function showAuthOk(msg) {
  document.getElementById('authOk').textContent = msg;
  document.getElementById('authOk').style.display = 'block';
}

// ═══════════ AUTH UI ═══════════
function showAuth(mode) {
  document.getElementById('loginForm').style.display = mode === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = mode === 'register' ? '' : 'none';
  document.getElementById('pendingBox').style.display = 'none';
  document.getElementById('authErr').style.display = 'none';
  document.getElementById('authOk').style.display = 'none';
  document.getElementById('authSub').textContent = mode === 'login' ? '登录您的账户' : '注册新账户';
}

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPwd').value;
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { showAuthError('请输入邮箱和密码'); return; }
  btn.disabled = true; btn.textContent = '登录中...';
  document.getElementById('authErr').style.display = 'none';
  try {
    const data = await SB.authSignIn(email, password);
    await loadUserProfile(data.user.id);
  } catch(e) {
    showAuthError(e.message || '登录失败');
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const email = document.getElementById('regEmail').value.trim();
  const name = document.getElementById('regName').value.trim() || email.split('@')[0];
  const password = document.getElementById('regPwd').value;
  const pwd2 = document.getElementById('regPwd2').value;
  const btn = document.getElementById('regBtn');
  document.getElementById('authErr').style.display = 'none';

  if (password !== pwd2) {
    document.getElementById('authErr').textContent = '两次输入的密码不一致';
    document.getElementById('authErr').style.display = 'block'; return false;
  }
  if (password.length < 6) {
    document.getElementById('authErr').textContent = '密码至少6位';
    document.getElementById('authErr').style.display = 'block'; return false;
  }
  btn.disabled = true; btn.textContent = '注册中...';

  try {
    await SB.authSignUp(email, password, email, name);
  } catch(e) {
    document.getElementById('authErr').textContent = e.message;
    document.getElementById('authErr').style.display = 'block';
    btn.disabled = false; btn.textContent = '注册并提交审批';
    return false;
  }
  document.getElementById('authOk').textContent = '✅ 注册成功！请等待管理员审批通过后登录使用。';
  document.getElementById('authOk').style.display = 'block';
  btn.disabled = false; btn.textContent = '注册并提交审批';
  showAuth('login');
  return false;
}

async function loadUserProfile(userId) {
  let profile;
  try {
    const list = await SB.get('profiles', {eq: {col:'id', val:userId}});
    if (!list.length) throw new Error('无profile记录，可能注册触发器未执行');
    profile = list[0];
  } catch(e) {
    await SB.authSignOut();
    document.getElementById('authErr').textContent = '账户信息异常：' + e.message;
    document.getElementById('authErr').style.display = 'block';
    return;
  }
  CURRENT_USER = profile;

  if (!profile.is_approved) {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('pendingBox').style.display = '';
    document.getElementById('authSub').textContent = '等待审批';
    return;
  }

  // 登录成功 → 显示管理面板
  document.getElementById('authBox').classList.add('hidden');
  document.getElementById('adminPage').classList.remove('hidden');
  document.getElementById('userBadge').textContent = profile.display_name || profile.username;
  if (profile.is_admin) {
    loadPendingUsers();
    loadAllUsers();
    loadUnmatchedItems();
	    loadFeedbackSummary();
  } else {
    // 非管理员只提示已被批准
    document.querySelector('.admin-content').innerHTML =
      '<div style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">✅</div>' +
      '<h2 style="font-weight:700;color:#1a1a2e;margin-bottom:8px">✅ 审批已通过</h2>' +
      '<p style="color:#666;font-size:15px;line-height:1.6;margin-bottom:20px">你的账户已被管理员批准。</p>' +
      '<a href="tool.html" class="btn" style="display:inline-flex;align-items:center;gap:6px;padding:12px 28px;font-size:15px;background:#0f3460;color:#fff;border:none;border-radius:8px;text-decoration:none;font-weight:600">🚀 进入套价工具</a></div>';
  }
}

function doLogout() {
  SB.authSignOut();
  CURRENT_USER = null;
  document.getElementById('adminPage').classList.add('hidden');
  document.getElementById('authBox').classList.remove('hidden');
  document.getElementById('pendingBox').style.display = 'none';
  showAuth('login');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPwd').value = '';
}

async function checkApproval() {
  // 尝试刷新 token
  const rt = localStorage.getItem('sb-refresh-token');
  if (rt) {
    try {
      const ac = new AbortController(); setTimeout(() => ac.abort(), 5000);
      const r = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token', {
        method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
        body:JSON.stringify({refresh_token:rt}), signal: ac.signal
      });
      if (r.ok) {
        const d = await r.json();
        localStorage.setItem('sb-access-token', d.access_token);
        localStorage.setItem('sb-refresh-token', d.refresh_token);
        localStorage.setItem('sb-user', JSON.stringify(d.user));
      }
    } catch(e) {}
  }
  const session = localStorage.getItem('sb-access-token') ? {user:{id: JSON.parse(localStorage.getItem('sb-user')||'{}')?.id}} : null;
  if (session) await loadUserProfile(session.user.id);
}

// ═══════════ ADMIN ═══════════
async function loadPendingUsers() {
  const data = await SB.get('profiles', {eq: {col:'is_approved', val:'false'}, order: {col:'created_at', asc:true}}).catch(()=>[]);
  const el = document.getElementById('pendingUsers');
  document.getElementById('pendingCount').textContent = `（${data?.length || 0}）`;
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty-state">暂无待审批用户</div>'; return;
  }
  el.innerHTML = data.map(u => `
    <div class="user-card">
      <div class="row">
        <span class="name">${esc(u.display_name||u.username)}</span>
        <span class="email">${u.username}</span>
        <span class="badge badge-pending">待审批</span>
        <span class="date">${new Date(u.created_at).toLocaleString('zh-CN')}</span>
        <button class="btn btn-sm btn-suc" onclick="approveUser('${u.id}')" style="margin-left:auto">✅ 批准</button>
      </div>
    </div>`).join('');
}

async function loadAllUsers() {
  const data = await SB.get('profiles', {order: {col:'created_at', asc:false}}).catch(()=>[]);
  const el = document.getElementById('allUsers');
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty-state">暂无用户</div>'; return;
  }
  el.innerHTML = data.map(u => `
    <div class="user-card">
      <div class="row">
        <span class="name">${esc(u.display_name||u.username)}</span>
        <span class="email">${u.username}</span>
        <span class="badge ${u.is_admin ? 'badge-admin' : u.is_approved ? 'badge-approved' : 'badge-pending'}">
          ${u.is_admin ? '管理员' : u.is_approved ? '已批准' : '待审批'}
        </span>
        <span class="date">${new Date(u.created_at).toLocaleString('zh-CN')}</span>
        ${!u.is_approved ? `<button class="btn btn-sm btn-suc" onclick="approveUser('${u.id}')">✅ 批准</button>` : ''}
        ${u.is_approved && !u.is_admin ? `<button class="btn btn-sm" onclick="setAdmin('${u.id}')" style="color:var(--acc)">设为管理员</button>` : ''}
      </div>
    </div>`).join('');
}

async function approveUser(userId) {
  try {
    await SB.patch('profiles', 'id', userId, {is_approved: true, approved_at: new Date().toISOString()});
    loadPendingUsers();
    loadAllUsers();
  } catch(e) { alert('审批失败：'+e.message); }
}

async function setAdmin(userId) {
  if (!confirm('确认将该用户设为管理员？')) return;
  try {
    await SB.patch('profiles', 'id', userId, {is_admin: true, is_approved: true});
    loadAllUsers();
  } catch(e) { alert('操作失败：'+e.message); }
}

async function loadFeedbackSummary() {
  const el = document.getElementById('fbSummary');
  if (!el) return;
  try {
    const fb = await SB.get('feedback', {order:{col:'created_at',asc:false}, limit:200});
    if (!fb || !fb.length) { el.innerHTML = '暂无反馈'; return; }
    document.getElementById('fbSummaryCount').textContent = '（'+fb.length+'条）';
    el.innerHTML = fb.map(f =>
      '<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">' +
      '<div style="display:flex;gap:4px;margin-bottom:2px">' +
      '<span style="padding:0 5px;border-radius:3px;font-size:10px;background:var(--acc-d);color:var(--acc)">'+esc(f.fb_type)+'</span>' +
      '<span style="color:var(--tx3);font-size:10px">'+esc(f.user_name||'')+'</span>' +
      '<span style="color:var(--tx3);font-size:10px;margin-left:auto">'+new Date(f.created_at).toLocaleString('zh-CN')+'</span></div>' +
      '<div style="color:var(--tx)">'+esc(f.fb_desc)+'</div>' +
      (f.fb_ref ? '<div style="font-size:10px;color:var(--tx3);margin-top:1px">相关：'+esc(f.fb_ref)+'</div>' : '') +
      '</div>'
    ).join('');
  } catch(e) { el.innerHTML = '加载失败'; }
}

async function loadUnmatchedItems() {
  const el = document.getElementById('unmatchedItems');
  document.getElementById('unmatchedCount').textContent = '';
  try {
    const projects = await SB.get('projects', {order: {col:'created_at', asc:false}, limit:200});
    if (!projects || !projects.length) { el.innerHTML = '暂无方案数据'; return; }
    const counter = {};
    projects.forEach(p => {
      const groups = p.groups_json;
      groups?.forEach(g => { g.sections?.forEach(s => { s.rows?.forEach(r => {
        if (!r.subs || !r.subs.length) {
          const key = (r.name||'') + '|' + (r.unit||'');
          if (!counter[key]) counter[key] = {name:r.name, unit:r.unit||'', spec:r.spec||'', count:0};
          counter[key].count++;
        }
      }); }); });
    });
    const items = Object.values(counter).sort((a,b) => b.count - a.count);
    document.getElementById('unmatchedCount').textContent = '（'+items.length+'项）';
    if (!items.length) { el.innerHTML = '🎉 所有清单项都已匹配基准价'; return; }
    el.innerHTML = items.slice(0,100).map(it =>
      '<div style="padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center">' +
      '<span style="background:var(--red-d);color:var(--red);padding:0 5px;border-radius:3px;font-size:10px;font-weight:600">'+it.count+'次</span>' +
      '<span style="flex:1;font-size:12px;color:var(--tx)">'+esc(it.name)+'</span>' +
      '<span style="font-size:11px;color:var(--tx3);width:40px">'+esc(it.unit)+'</span></div>'
    ).join('');
  } catch(e) { el.innerHTML = '加载失败：'+e.message; }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
